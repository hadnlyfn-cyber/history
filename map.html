<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта нашей любви</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        .map-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-color: #fff;
            overflow: hidden;
        }

        .map {
            width: 100%;
            height: 100%;
            background-color: #e5c79b;
            border: 3px solid #d1b98d;
            border-radius: 10px;
            position: relative;
            background-image: url('images/a_wide_high_resolution_vintage_fantasy_map_scene.png'); /* Путь к изображению в папке images */
            background-size: cover;
            background-position: center;
        }

        .map .point {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: red;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
        }

        .point:hover::after {
            content: attr(data-info);
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px;
            border-radius: 5px;
        }

        /* Корректировка координат точек */
        .point-1 { top: 16%; left: 19%; } /* Начало */
        .point-2 { top: 30%; left: 35%; } /* Встреча */
        .point-3 { top: 50%; left: 55%; } /* Приключения */
        .point-4 { top: 66%; left: 72%; } /* Испытания */
        .point-5 { top: 75%; left: 36%; } /* Будущее */

        .info-button {
            background-color: #ff6f61;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            text-decoration: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Стили для текста на карте */
        .map-text {
            position: absolute;
            top: 80%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5em;
            color: #5c3d1f;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="map-container">
    <div class="map">
        <!-- Точки на карте с данными для переходов -->
        <div class="point point-1" data-info="Начало" onclick="window.location.href='start.html'"></div>
        <div class="point point-2" data-info="Встреча" onclick="window.location.href='meeting.html'"></div>
        <div class="point point-3" data-info="Приключения" onclick="window.location.href='adventures.html'"></div>
        <div class="point point-4" data-info="Испытания" onclick="window.location.href='challenges.html'"></div>
        <div class="point point-5" data-info="Будущее" onclick="window.location.href='future.html'"></div>

        <!-- Текст на карте -->
        <div class="map-text">Наши памятные места</div>
    </div>
    
    <!-- Кнопка перехода на главную страницу -->
    <a href="index.html" class="info-button">Назад на главную</a>
</div>

</body>
</html>
