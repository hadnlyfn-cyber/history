<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта нашей любви</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            color: #333;
        }

        header {
            background-color: #ff6f61;
            color: white;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin: 0;
        }

        .title-container {
            position: relative;
            text-align: center;
            color: white;
        }

        /* Титульная фотография */
        .title-container img {
            width: 100%;
            height: 100vh;
            object-fit: cover;
        }

        .title-container .text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        .btn {
            background-color: #ff6f61;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        footer {
            background-color: #ff6f61;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1>Карта нашей любви</h1>
</header>

<!-- Титульная страница с фотографией -->
<div class="title-container">
    <!-- Здесь будет твоя фотография, заменим love.jpg на путь к твоему фото -->
    <img src="love.jpg" alt="Фото пары">
    <div class="text">Начнем путешествие</div>
</div>

<!-- Кнопка перехода -->
<div style="text-align: center;">
    <a href="#map" class="btn">Перейти к карте</a>
</div>

<!-- Раздел с картой -->
<div id="map" class="map-container" style="width: 100%; height: 500px; margin-top: 20px;">
    <!-- Вставь ссылку на свою Google Map -->
    <iframe src="https://www.google.com/maps/d/u/0/embed?mid=1ZfZm-R03xM2x_vZKzPb6w3AwmK8kF7pT" width="100%" height="100%"></iframe>
</div>

<footer>
    <p>&copy; 2026 Наш сайт</p>
</footer>

</body>
</html>
