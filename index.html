<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта нашей любви</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            color: #333;
            overflow: hidden; /* Отключаем прокрутку */
        }

        /* Стиль для титульной страницы (интро) */
        .intro {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
            overflow: hidden; /* Отключаем прокрутку для видео */
        }

        /* Видео как фон */
        .intro video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            object-fit: cover; /* Покрытие экрана без искажения */
            z-index: -1; /* Видео будет на фоне */
        }

        .intro-text {
            font-size: 3em;
            font-weight: bold;
            text-align: center;
            z-index: 10; /* Текст будет поверх видео */
        }

        /* Стиль для кнопки перехода */
        .btn {
            background-color: #ff6f61;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2em;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<!-- Титульная страница (Интро) с видео -->
<div class="intro" onclick="window.location.href='map.html'">
    <!-- Вставляем видео -->
    <video autoplay muted loop>
        <source src="love1.mp4" type="video/mp4"> <!-- Убедись, что файл love1.mp4 в твоём репозитории -->
        Ваш браузер не поддерживает видео.
    </video>
    <div class="intro-text">
        Начнем путешествие
    </div>
</div>

</body>
</html>
