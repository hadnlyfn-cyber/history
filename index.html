<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта нашей любви</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            color: #333;
            overflow: hidden; /* Отключаем прокрутку */
        }

        /* Стиль для титульной страницы (интро) */
        .intro {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('love.jpg'); /* Указываем путь к фото */
            background-size: cover;
            background-position: center;
            cursor: pointer; /* Курсор меняется на указатель при наведении */
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        .intro-text {
            font-size: 3em;
            font-weight: bold;
            text-align: center;
            z-index: 10; /* Текст будет поверх изображения */
        }

        /* Стиль для кнопки перехода */
        .btn {
            background-color: #ff6f61;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2em;
            margin-top: 20px;
        }

        footer {
            background-color: #ff6f61;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<!-- Титульная страница (Интро) -->
<div class="intro" onclick="window.location.href='map.html'">
    <div class="intro-text">
        Начнем путешествие
    </div>
</div>

<footer>
    <p>&copy; 2026 Наш сайт</p>
</footer>

</body>
</html>
