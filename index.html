<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта нашей любви</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        .map-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-color: #fff;
        }

        /* SVG карта */
        svg {
            width: 100%;
            height: 100%;
            background-color: #f4e1c1;
        }

        /* Стиль для точек (меток) */
        .point {
            fill: red;
            cursor: pointer;
        }

        .point:hover {
            fill: darkred;
        }

        .info-button {
            background-color: #ff6f61;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            text-decoration: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .map-text {
            position: absolute;
            top: 80%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5em;
            color: #5c3d1f;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="map-container">
    <!-- SVG карта -->
    <svg viewBox="0 0 800 600">
        <!-- Основная область карты (контуры) -->
        <rect x="10" y="10" width="780" height="580" rx="20" ry="20" fill="tan" stroke="brown" stroke-width="5" />

        <!-- Метки на карте -->
        <circle class="point" cx="160" cy="150" r="15" data-info="Начало" onclick="window.location.href='start.html'"/>
        <circle class="point" cx="250" cy="230" r="15" data-info="Встреча" onclick="window.location.href='meeting.html'"/>
        <circle class="point" cx="400" cy="300" r="15" data-info="Приключения" onclick="window.location.href='adventures.html'"/>
        <circle class="point" cx="550" cy="380" r="15" data-info="Испытания" onclick="window.location.href='challenges.html'"/>
        <circle class="point" cx="450" cy="500" r="15" data-info="Будущее" onclick="window.location.href='future.html'"/>

        <!-- Путь между точками -->
        <path d="M160,150 Q250,180 250,230 Q400,250 400,300 Q550,310 550,380 Q450,450 450,500" fill="transparent" stroke="red" stroke-dasharray="10,10"/>

    </svg>

    <!-- Кнопка перехода на главную страницу -->
    <a href="index.html" class="info-button">Назад на главную</a>
</div>

</body>
</html>
